<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0c0d0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTracker">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Fit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0d0a;--panel:#15170f;--panel2:#1c1f14;--line:#2b2f1f;
  --ink:#f3f4ea;--muted:#9a9d86;--acc:#cdff3a;--dim:#8fa83f;--warn:#ff7a3d;
  --nav:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Barlow',sans-serif}

/* ── LAYOUT ── */
.page{display:none;position:fixed;top:0;left:0;right:0;bottom:var(--nav);
  overflow-y:auto;padding:0 16px 24px}
.page.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);
  background:var(--panel);border-top:1px solid var(--line);
  display:flex;z-index:10}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;color:var(--muted);font-family:'Space Mono',monospace;
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:8px 0}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round}
.nb.on{color:var(--acc)}

/* ── OVERLAY + SHEET ── */
.ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.75);z-index:20}
.sheet{display:none;position:fixed;left:0;right:0;bottom:0;
  background:var(--panel);border-top:2px solid var(--line);
  z-index:21;flex-direction:column;max-height:92vh}
.sheet.open{display:flex}
.ov.open{display:block}
.sh-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sh-hd{padding:14px 18px 12px;border-bottom:1px solid var(--line);flex-shrink:0}
.sh-title{font-family:'Anton',sans-serif;font-size:22px;text-transform:uppercase}
.sh-sub{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--muted);margin-top:3px}
.sh-last{font-size:13px;color:var(--muted);margin-top:6px}
.sh-last b{color:var(--acc)}
.sh-body{overflow-y:auto;flex:1;min-height:0;padding:16px 18px 24px;-webkit-overflow-scrolling:touch}

/* ── TYPOGRAPHY ── */
.ph{padding:26px 0 16px;border-bottom:1px solid var(--line);margin-bottom:18px}
.kicker{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.big{font-family:'Anton',sans-serif;font-size:clamp(30px,10vw,50px);
  text-transform:uppercase;line-height:.95}
.big span{color:var(--acc);display:block}
.sl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--dim);margin:20px 0 10px;
  display:flex;align-items:center;gap:10px}
.sl::after{content:"";flex:1;height:1px;background:var(--line)}

/* ── MACRO CARDS ── */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.mc{background:var(--panel);border:1px solid var(--line);padding:12px 14px}
.mc.f2{grid-column:span 2}
.ml{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted);margin-bottom:5px;
  display:flex;justify-content:space-between}
.ml b{color:var(--ink)}
.bt{height:5px;background:var(--panel2);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;background:var(--acc);transition:width .3s}
.bf.hi{background:var(--warn)}
.mn{font-family:'Anton',sans-serif;font-size:24px;color:var(--acc);margin-top:5px}
.mn small{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-left:2px}

/* ── DAY TABS ── */
.dtabs{display:flex;gap:6px;padding:12px 0 10px;
  overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:var(--bg);z-index:5;margin:0 -16px;padding-left:16px}
.dtabs::-webkit-scrollbar{display:none}
.dt{flex:0 0 auto;min-width:56px;background:var(--panel);border:1px solid var(--line);
  color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;
  padding:10px 6px 8px;cursor:pointer;text-align:center;text-transform:uppercase}
.dt b{font-family:'Anton',sans-serif;font-size:18px;display:block;color:var(--ink);
  font-weight:400;margin-bottom:2px}
.dt.on{background:var(--acc);border-color:var(--acc);color:#10120a}
.dt.on b{color:#10120a}

/* ── EXERCISE BUTTONS ── */
.ex-wrap{display:flex;border:1px solid var(--line);border-top:none}
.ex-wrap:first-of-type{border-top:1px solid var(--line)}
.ex-wrap:nth-child(even) .ex,.ex-wrap:nth-child(even) .ex-ed{background:var(--panel2)}
.ex-wrap.done{border-left:3px solid var(--acc)}
.ex-wrap.part{border-left:3px solid var(--dim)}
.ex{flex:1;min-width:0;background:var(--panel);border:none;
  padding:13px 14px;display:grid;grid-template-columns:26px 1fr auto;
  gap:0 10px;align-items:center;cursor:pointer;text-align:left;
  font-family:'Barlow',sans-serif;-webkit-appearance:none;appearance:none}
.ex:active{background:var(--line)}
.ex-ed{width:40px;flex-shrink:0;background:var(--panel);border:none;
  border-left:1px solid var(--line);color:var(--dim);font-size:17px;
  cursor:pointer;-webkit-appearance:none;appearance:none;
  display:flex;align-items:center;justify-content:center}
.ex-ed:active{background:var(--acc);color:#10120a}
.ex-num{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim)}
.ex-name{font-size:15px;font-weight:600;color:var(--ink)}
.ex-name small{display:block;font-size:11px;color:var(--muted);font-weight:400;margin-top:1px}
.ex-st{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--muted);margin-top:2px}
.ex-st.ok{color:var(--acc)}
.ex-st.pt{color:var(--dim)}
.ex-r{text-align:right}
.ex-sets{font-family:'Anton',sans-serif;font-size:17px;color:var(--acc);letter-spacing:.5px;font-weight:400}
.ex-last{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--muted);margin-top:2px}

/* ── WEEK ── */
.wkbar{display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px}
.wkb{font-family:'Space Mono',monospace;font-size:11px;background:var(--panel);
  border:1px solid var(--line);padding:5px 10px;color:var(--muted)}
.wkb b{color:var(--acc)}
.wkrpe{font-family:'Space Mono',monospace;font-size:10px}
.wkctrl{display:flex;align-items:center;gap:8px;padding:6px 0 12px}
.wkbtn{background:var(--panel);border:1px solid var(--line);color:var(--ink);
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;flex-shrink:0;-webkit-appearance:none;appearance:none}
.wkbtn:active{background:var(--line)}
.wkn{font-family:'Anton',sans-serif;font-size:22px;color:var(--acc);
  text-align:center;flex:1;font-weight:400}
.wkp{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;text-align:center}
.cbar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:10px 0 6px}
.cw{height:7px;background:var(--panel2);border-radius:4px}
.cw.d{background:var(--dim)}
.cw.c{background:var(--acc)}
.cw.dl{background:var(--warn)}

/* ── CARDIO ── */
.crd{background:linear-gradient(135deg,rgba(255,122,61,.14),rgba(205,255,58,.07));
  border:1px solid var(--warn);padding:14px 16px;margin-top:8px}
.crd-t{font-family:'Anton',sans-serif;font-size:15px;color:var(--warn);
  text-transform:uppercase;letter-spacing:.5px;font-weight:400}
.crd p{font-size:13px;color:var(--ink);margin-top:5px}

/* ── MEAL ROWS ── */
.mr{background:var(--panel);border:1px solid var(--line);border-top:none;
  padding:13px 14px;display:grid;grid-template-columns:44px 1fr 38px;gap:0 10px;align-items:center}
.mr:first-of-type{border-top:1px solid var(--line)}
.mr:nth-child(even){background:var(--panel2)}
.mtime{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim)}
.mname{font-size:14px;font-weight:600}
.mname small{font-family:'Space Mono',monospace;font-weight:400;font-size:9px;
  color:var(--muted);border:1px solid var(--line);padding:1px 5px;margin-left:5px}
.mmac{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--muted);margin-top:3px}
.mmac b{color:var(--acc)}
.mnote{font-size:11.5px;color:var(--muted);margin-top:2px;font-style:italic}
.mlbtn{background:var(--panel2);border:1px solid var(--line);color:var(--acc);
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;flex-shrink:0;
  -webkit-appearance:none;appearance:none}
.mlbtn:active{background:var(--line)}
.mlbtn.has{background:rgba(205,255,58,.15);border-color:var(--dim);font-size:14px}

/* ── TODAY CARDS ── */
.tgym{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--acc);
  padding:16px;margin-bottom:8px}
.tgk{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--dim)}
.tgn{font-family:'Anton',sans-serif;font-size:28px;text-transform:uppercase;
  letter-spacing:.3px;margin:5px 0 2px;font-weight:400}
.tgf{font-size:13px;color:var(--muted)}
.tgl{font-family:'Space Mono',monospace;font-size:10px;color:var(--acc);
  text-transform:uppercase;letter-spacing:.16em;margin-top:11px;
  display:block;cursor:pointer;background:none;border:none;
  font-family:'Space Mono',monospace;padding:0;text-align:left}
.rday{background:var(--panel);border:1px solid var(--line);
  padding:22px 16px;text-align:center}
.rday-e{font-size:34px}
.rday-t{font-family:'Anton',sans-serif;font-size:22px;text-transform:uppercase;
  margin:8px 0 4px;font-weight:400}
.rday-s{font-size:13px;color:var(--muted)}
.bwc{background:var(--panel);border:1px solid var(--line);padding:14px 16px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  -webkit-appearance:none;appearance:none;width:100%;text-align:left}
.bwn{font-family:'Anton',sans-serif;font-size:34px;color:var(--acc);flex:1;font-weight:400}
.bwn small{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);display:block}
.bwl{font-family:'Space Mono',monospace;font-size:10px;color:var(--acc);
  text-transform:uppercase;letter-spacing:.12em}

/* ── STATS ── */
.sc{background:var(--panel);border:1px solid var(--line);padding:16px;margin-bottom:8px}
.ssh{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.sv{font-family:'Anton',sans-serif;font-size:32px;color:var(--acc);font-weight:400}
.sv small{font-family:'Barlow',sans-serif;font-size:15px;color:var(--muted);margin-left:3px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.prr{background:var(--panel);border:1px solid var(--line);border-top:none;
  padding:10px 14px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.prr:first-child{border-top:1px solid var(--line)}
.prr:nth-child(even){background:var(--panel2)}
.prn{font-size:13px;font-weight:600}
.prv{font-family:'Anton',sans-serif;font-size:18px;color:var(--acc);
  text-align:right;font-weight:400}
.prv small{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);display:block}
.hr{background:var(--panel);border:1px solid var(--line);border-top:none;
  padding:9px 14px;display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}
.hr:first-child{border-top:1px solid var(--line)}
.hr:nth-child(even){background:var(--panel2)}
.hd{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--muted)}
.hn{font-size:13px;font-weight:600}
.hs{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--acc);text-align:right}
.bwr{display:flex;justify-content:space-between;font-family:'Space Mono',monospace;
  font-size:11px;padding:8px 12px;background:var(--panel);
  border:1px solid var(--line);border-top:none;color:var(--muted)}
.bwr:first-child{border-top:1px solid var(--line)}
.bwr b{color:var(--ink)}
.up{color:var(--acc)}.dn{color:var(--warn)}

/* ── SLEEP ── */
.slp-hero{background:var(--panel);border:1px solid var(--line);padding:16px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  -webkit-appearance:none;appearance:none;width:100%;text-align:left;margin-bottom:6px}
.slp-n{font-family:'Anton',sans-serif;font-size:38px;color:var(--acc);font-weight:400;line-height:1}
.slp-n small{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);display:block;margin-top:2px}
.slp-info{flex:1}
.slp-lbl{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.slp-tbar{height:6px;background:var(--panel2);border-radius:3px;overflow:hidden}
.slp-tf{height:100%;border-radius:3px;background:var(--acc)}
.slp-tf.mid{background:var(--dim)}.slp-tf.low{background:var(--warn)}
.slp-hist{background:var(--panel);border:1px solid var(--line);border-top:none;
  padding:10px 14px;display:grid;grid-template-columns:48px 1fr 34px;gap:0 10px;align-items:center}
.slp-hist:first-child{border-top:1px solid var(--line)}
.slp-hist:nth-child(even){background:var(--panel2)}
.slp-hd{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--muted)}
.slp-hbar{height:7px;background:var(--panel2);border-radius:4px;overflow:hidden}
.slp-hf{height:100%;border-radius:4px;background:var(--acc)}
.slp-hf.mid{background:var(--dim)}.slp-hf.low{background:var(--warn)}
.slp-hv{font-family:'Anton',sans-serif;font-size:15px;color:var(--acc);text-align:right;font-weight:400}
.slp-hv.mid{color:var(--dim)}.slp-hv.low{color:var(--warn)}
.slp-step{display:flex;align-items:center;justify-content:center;gap:20px;padding:20px 0 10px}
.slp-val{font-family:'Anton',sans-serif;font-size:56px;color:var(--acc);font-weight:400;
  min-width:100px;text-align:center;line-height:1}
.slp-val small{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);display:block;margin-top:4px}
.slp-pm{width:52px;height:52px;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);font-size:26px;cursor:pointer;-webkit-appearance:none;appearance:none;
  display:flex;align-items:center;justify-content:center}
.slp-pm:active{background:var(--acc);color:#10120a}

/* ── EXERCISE SELECTOR ── */
.grp-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px;
  scrollbar-width:none;border-bottom:1px solid var(--line)}
.grp-tabs::-webkit-scrollbar{display:none}
.grp-tab{flex:0 0 auto;background:var(--panel2);border:1px solid var(--line);
  color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;
  padding:7px 10px;cursor:pointer;-webkit-appearance:none;appearance:none;white-space:nowrap;
  text-transform:uppercase}
.grp-tab.on{background:var(--acc);border-color:var(--acc);color:#10120a}
.ex-items{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.ex-pick{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;
  padding:12px 14px;text-align:left;cursor:pointer;-webkit-appearance:none;appearance:none;
  border-radius:0}
.ex-pick.on{background:rgba(205,255,58,.15);border-color:var(--acc);color:var(--acc)}
.ex-pick:active{background:var(--line)}
.cur-ex-tag{font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);
  padding:8px 0 12px;border-bottom:1px solid var(--line);margin-bottom:10px}
.cur-ex-tag b{color:var(--ink)}

/* ── SET INPUTS ── */
.sh{display:grid;grid-template-columns:28px 1fr 1fr 38px;gap:4px;margin-bottom:6px}
.scl{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:.12em;color:var(--muted);text-align:center}
.sr{display:grid;grid-template-columns:28px 1fr 1fr 38px;gap:6px;align-items:center;margin-bottom:8px}
.sn{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--muted);text-align:center}
.si{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  font-family:'Barlow',sans-serif;font-size:16px;font-weight:600;
  padding:10px 4px;width:100%;text-align:center;
  -webkit-appearance:none;-moz-appearance:textfield}
.si::-webkit-outer-spin-button,.si::-webkit-inner-spin-button{-webkit-appearance:none}
.si:focus{outline:none;border-color:var(--dim)}
.si::placeholder{color:var(--line)}
.sc2{width:36px;height:36px;background:var(--panel2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:15px;-webkit-appearance:none;appearance:none;color:var(--muted)}
.sc2.on{background:rgba(205,255,58,.18);border-color:var(--acc);color:var(--acc)}

/* ── FORM ── */
.fg{margin-bottom:14px}
.fl{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block}
.fi{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  font-family:'Barlow',sans-serif;font-size:17px;font-weight:600;
  padding:11px 14px;width:100%;-webkit-appearance:none;-moz-appearance:textfield}
.fi::-webkit-outer-spin-button,.fi::-webkit-inner-spin-button{-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(--dim)}
.fi::placeholder{color:var(--muted)}
textarea.fi{resize:none;height:68px;font-size:13.5px;font-weight:400}
.mt3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.kbox{font-family:'Anton',sans-serif;font-size:26px;color:var(--acc);
  text-align:center;padding:10px;background:var(--panel2);
  border:1px solid var(--line);margin-bottom:14px;font-weight:400}
.kbox small{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);display:block;margin-top:2px}
.btnp{background:var(--acc);color:#10120a;font-family:'Anton',sans-serif;font-size:18px;
  letter-spacing:.5px;text-transform:uppercase;border:none;padding:15px;
  width:100%;cursor:pointer;font-weight:400;margin-top:4px;-webkit-appearance:none}
.btnp:active{opacity:.8}
.btns{background:none;color:var(--muted);font-family:'Space Mono',monospace;
  font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  border:1px solid var(--line);padding:10px 16px;width:100%;
  cursor:pointer;margin-top:6px;-webkit-appearance:none}
.btns:active{color:var(--ink)}
.empty{text-align:center;padding:28px 12px;color:var(--muted);font-size:14px}
.empty b{color:var(--ink);display:block;margin-bottom:6px;font-size:16px}
</style>
</head>
<body>

<div id="pg-hoy" class="page on"></div>
<div id="pg-gym" class="page"></div>
<div id="pg-com" class="page"></div>
<div id="pg-sta" class="page"></div>
<div id="pg-sue" class="page"></div>

<nav class="nav">
  <button class="nb on" data-pg="hoy">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Hoy
  </button>
  <button class="nb" data-pg="gym">
    <svg viewBox="0 0 24 24"><path d="M6.5 6.5h11M6.5 17.5h11M4 12h16M2 8h2M20 8h2M2 16h2M20 16h2"/></svg>Gym
  </button>
  <button class="nb" data-pg="com">

// ── STATE ────────────────────────────────────────────
let S={pg:'hoy',day:1,week:1,workouts:{},nutrition:{},bw:[],customEx:{},sleep:{}};
function load(){
  try{
    const x=localStorage.getItem('ft3');
    if(!x)return;
    const parsed=JSON.parse(x);
    S={...S,...parsed};
    // migrate old date-keyed workouts (YYYY-MM-DD) → week+day keys (W1D1)
    const old=Object.keys(S.workouts).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k));
    if(old.length){
      const byDay={};
      old.forEach(date=>{
        const log=S.workouts[date];const did=log.dayId||1;
        (byDay[did]=byDay[did]||[]).push({date,log});
      });
      const nw={};
      // keep existing W*D* keys
      Object.keys(S.workouts).filter(k=>/^W\d+D\d+$/.test(k)).forEach(k=>nw[k]=S.workouts[k]);
      // convert old date keys — latest entry → current week, older entries → earlier weeks
      Object.entries(byDay).forEach(([did,arr])=>{
        arr.sort((a,b)=>a.date.localeCompare(b.date));
        arr.forEach((e,i)=>{
          const w=Math.max(1,S.week-(arr.length-1-i));
          const key=`W${w}D${did}`;
          if(!nw[key])nw[key]={...e.log,week:w,date:e.date};
        });
      });
      S.workouts=nw;
      save();
    }
  }catch(e){
    console.error('ft3 load failed:',e);
  }
}
function save(){
  try{localStorage.setItem('ft3',JSON.stringify(S));}
  catch(e){console.error('ft3 save failed:',e);}
}

// ── HELPERS ──────────────────────────────────────────
function tod(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`}
function p2(n){return String(n).padStart(2,'0')}
function fd(s){const[,m,d]=s.split('-');const mo=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return`${+d} ${mo[+m-1]}`}
function kc(p,c,f){return Math.round((+p||0)*4+(+c||0)*4+(+f||0)*9)}
function pc(v,t){return Math.min(100,Math.max(0,Math.round(v/t*100)))}
function rs(ex){return ex.rl||(ex.r1===ex.r2?`${ex.r1}`:`${ex.r1}-${ex.r2}`)}
function curKey(){return`W${S.week}D${S.day}`}

function nutDay(){
  const meals=(S.nutrition[tod()]||{}).meals||{};
  let p=0,c=0,f=0;
  Object.values(meals).forEach(m=>{p+=+m.P||0;c+=+m.C||0;f+=+m.F||0});
  return{P:p,C:c,F:f,k:kc(p,c,f)};
}

function lastSess(exId,dayId){
  const d=dayId||S.day;
  for(let w=S.week-1;w>=1;w--){
    const sets=S.workouts[`W${w}D${d}`]?.exercises?.[exId];
    if(sets&&sets.length)return{sets,week:w};
  }
  return null;
}

function doneSets(exId){
  return(S.workouts[curKey()]?.exercises?.[exId]||[]).filter(s=>s.done).length;
}

function isFullDone(exId){
  const ex=DAYS.flatMap(d=>d.ex).find(e=>e.id===exId);
  return ex&&doneSets(exId)>=ex.s;
}

function prW(exId){
  let max=0;
  Object.values(S.workouts).forEach(log=>{
    (log.exercises?.[exId]||[]).forEach(s=>{if((+s.w||0)>max)max=+s.w});
  });
  return max>0?max:null;
}

function latBw(){return S.bw.length?S.bw[S.bw.length-1]:null}

function macroGrid(nut){
  const kp=pc(nut.k,TGT.kcal),pp=pc(nut.P,TGT.P),cp=pc(nut.C,TGT.C),fp=pc(nut.F,TGT.F);
  return`<div class="mg">
    <div class="mc f2"><div class="ml">Calorías <b>${nut.k}/${TGT.kcal} kcal</b></div>
      <div class="bt"><div class="bf ${kp>100?'hi':''}" style="width:${kp}%"></div></div>
      <div class="mn">${nut.k}<small>kcal</small></div></div>
    <div class="mc"><div class="ml">Proteína <b>${nut.P}g</b></div>
      <div class="bt"><div class="bf ${pp>100?'hi':''}" style="width:${pp}%"></div></div>

      <div class="bt"><div class="bf ${cp>100?'hi':''}" style="width:${cp}%"></div></div>

      <div class="mn">${nut.F}<small>g</small></div></div>
  </div>`;
}

      <div><div class="wkn">${S.week}<small style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);font-weight:400">/7</small></div>
        <div class="wkp">${ph?.l}</div></div>
      <button class="wkbtn" onclick="chgWeek(1)">+</button>
    </div></div>`;
}

function rCom(){
  const p=document.getElementById('pg-com');
  const nut=nutDay();
  const logs=(S.nutrition[tod()]||{}).meals||{};

  const mrows=MEALS.map(m=>{
    const ml=logs[m.id];
    const has=ml&&(ml.P>0||ml.C>0||ml.F>0);
    return`<div class="mr">
      <div class="mtime">${m.t}</div>
      <div><div class="mname">${m.n}${m.opt?'<small>opcional</small>':''}</div>
        ${has?`<div class="mmac">P:<b>${ml.P}g</b> C:<b>${ml.C}g</b> G:<b>${ml.F}g</b> <b>${kc(ml.P,ml.C,ml.F)}kcal</b></div>
          ${ml.notes?`<div class="mnote">${ml.notes}</div>`:''}`
          :`<div class="mmac">${m.d}</div>`}
      </div>
      <button class="mlbtn ${has?'has':''}" onclick="openMealSheet(${m.id})">${has?'✓':'+'}</button>
    </div>`;
  }).join('');

  p.innerHTML=`<div class="ph"><div class="kicker">Registro del día</div>
    <div class="big">Comida<span>Nutrición</span></div></div>
    ${macroGrid(nut)}
    <div style="font-size:12px;color:var(--muted);margin-bottom:2px;border-left:2px solid var(--dim);padding-left:10px">
      Objetivo: <b style="color:var(--ink)">150-165g proteína</b> · 30-40g por comida
    </div>
    <div class="sl">Comidas del día</div>${mrows}`;
}

function rSta(){
  const p=document.getElementById('pg-sta');
  const all=Object.keys(S.workouts);
  const ph=PH[Math.min(S.week,7)];
  const wkCnt=all.filter(k=>k.startsWith(`W${S.week}D`)).length;

  const cbar=Array.from({length:7},(_,i)=>{
    const w=i+1;
    let c=w<S.week?'d':w===S.week?(w===7?'dl':'c'):w===7?'dl':'';
    return`<div class="cw ${c}"></div>`;
  }).join('');

  const prRows=DAYS.map(d=>d.ex[0]).map(ex=>{
    const pr=prW(ex.id);
    return pr?`<div class="prr"><div class="prn">${ex.n}</div><div class="prv">${pr}kg<small>PR</small></div></div>`:''
  }).filter(Boolean).join('');

  const bwRows=S.bw.slice(-10).reverse().map((e,i,arr)=>{
    const prev=arr[i+1];
    let tr='';
    if(prev){const d=(e.w-prev.w).toFixed(1);tr=d>0?`<span class="up">+${d}</span>`:d<0?`<span class="dn">${d}</span>`:''}
    return`<div class="bwr"><span>${fd(e.d)}</span><span><b>${e.w} kg</b> ${tr}</span></div>`;
  }).join('');

  const histRows=Object.entries(S.workouts)
    .sort((a,b)=>{
      const wa=+(a[0].match(/W(\d+)/)?.[1]||0),da=+(a[0].match(/D(\d+)/)?.[1]||0);
      const wb=+(b[0].match(/W(\d+)/)?.[1]||0),db=+(b[0].match(/D(\d+)/)?.[1]||0);
      return wb!==wa?wb-wa:db-da;
    }).slice(0,10)
    .map(([k,log])=>{
      const dy=DAYS.find(x=>x.id===log.dayId);
      const ts=Object.values(log.exercises||{}).reduce((a,s)=>a+s.filter(x=>x.done).length,0);
      const wn=log.week||k.match(/W(\d+)/)?.[1]||'?';
      const dt=log.date?fd(log.date):`Sem ${wn}`;
      return`<div class="hr"><div class="hd">${dt}<br><span style="color:var(--dim);font-size:9px">Sem ${wn}</span></div><div class="hn">${dy?dy.n:'?'}</div><div class="hs">${ts}s</div></div>`;
    }).join('');

  p.innerHTML=`<div class="ph"><div class="kicker">Tu evolución</div>
    <div class="big">Stats<span>Progreso</span></div></div>
    <div class="sl">Ciclo 7 semanas</div>
    <div class="sc"><div class="ssh">Semana actual</div>
      <div class="sv">${S.week}<small>/ 7</small></div>
      <div class="cbar">${cbar}</div>
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);margin-top:6px">${ph?.l} · ${ph?.rpe}</div>
    </div>
    <div class="sg">
      <div class="sc"><div class="ssh">Sesiones totales</div><div class="sv">${all.length}</div></div>
      <div class="sc"><div class="ssh">Esta semana</div><div class="sv">${wkCnt}<small>/ 5</small></div></div>
    </div>
    ${prRows?`<div class="sl">PRs · Movimientos principales</div>${prRows}`:''}
    <div class="sl">Peso corporal</div>
    ${bwRows||'<div class="empty"><b>Sin registros aún</b>Andá a Hoy y registrá tu peso.</div>'}
    ${histRows?`<div class="sl">Historial</div>${histRows}`:''}
    <div class="sl">Backup</div>
    <div style="background:var(--panel);border:1px solid var(--line);padding:14px 16px;margin-bottom:6px;font-size:12px;color:var(--muted);border-left:3px solid var(--dim)">
      Safari puede borrar datos si no usás el app por varios días.<br>
      <b style="color:var(--ink)">Agregalo a la pantalla de inicio</b> para storage persistente.
    </div>
    <button class="btnp" onclick="exportData()" style="margin-bottom:6px">Exportar datos (backup)</button>
    <button class="btns" onclick="importData()">Importar backup</button>`;
}

// ── SLEEP PAGE ───────────────────────────────────────
function rSue(){
  const p=document.getElementById('pg-sue');
  const t=tod();
  const today=S.sleep?.[t];
  const TGT=8;
  const slpCls=h=>h>=7?'':h>=6?'mid':'low';

  const h=today?.h;
  const pct=h?Math.min(100,Math.round(h/TGT*100)):0;
  const cls=slpCls(h||0);

  const hero=`<button class="slp-hero" onclick="openSueSheet()">
    <div class="slp-n" style="${cls==='low'?'color:var(--warn)':cls==='mid'?'color:var(--dim)':''}">${h!=null?h:'—'}<small>${h!=null?'horas':'Sin registro hoy'}</small></div>
    <div class="slp-info">
      <div class="slp-lbl">Anoche · objetivo 8h</div>
      ${h!=null?`<div class="slp-tbar"><div class="slp-tf ${cls}" style="width:${pct}%"></div></div>`:''}
    </div>
    <div class="bwl">+ Registrar</div>
  </button>`;

  const dates=Object.keys(S.sleep||{}).sort().reverse().slice(0,14);
  const avg=dates.length?(dates.reduce((a,d)=>a+(S.sleep[d].h||0),0)/dates.length).toFixed(1):null;

  const histRows=dates.map(d=>{
    const dh=S.sleep[d].h;
    const dp=Math.min(100,Math.round(dh/TGT*100));
    const dc=slpCls(dh);
    return`<div class="slp-hist">
      <div class="slp-hd">${fd(d)}</div>
      <div class="slp-hbar"><div class="slp-hf ${dc}" style="width:${dp}%"></div></div>
      <div class="slp-hv ${dc}">${dh}h</div>
    </div>`;
  }).join('');

  p.innerHTML=`<div class="ph"><div class="kicker">Descanso</div>
    <div class="big">Sueño<span>Registro</span></div></div>
    ${hero}
    ${avg?`<div class="sc" style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;padding:14px 16px">
      <div><div class="ssh">Promedio (${dates.length} noches)</div>
        <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)">Objetivo: 7-9h por noche</div></div>
      <div class="sv">${avg}<small>h</small></div>
    </div>`:''}
    <div class="sl">Historial</div>
    ${histRows||'<div class="empty"><b>Sin registros aún</b>Tocá el card de arriba para empezar.</div>'}`;
}

// ── SLEEP SHEET ──────────────────────────────────────
let curSueH=7.5;

function openSueSheet(){
  const t=tod();
  const ex=S.sleep?.[t];
  if(ex!=null){curSueH=ex.h;}
  else{
    const dates=Object.keys(S.sleep||{}).sort().reverse();
    curSueH=dates.length?S.sleep[dates[0]].h:7.5;
  }
  updSue();
  openSheet('sh-sue');
}

function stepSue(d){
  curSueH=Math.max(3,Math.min(13,+(curSueH+d).toFixed(1)));
  updSue();
}

function updSue(){
  const el=document.getElementById('sue-val');
  if(el)el.innerHTML=`${curSueH}<small>horas</small>`;
}

function saveSue(){
  const t=tod();
  if(!S.sleep)S.sleep={};
  S.sleep[t]={h:curSueH};
  save();closeSheet();
  setTimeout(()=>{rSue();rHoy();},50);
}

function delSue(){
  const t=tod();
  if(S.sleep?.[t])delete S.sleep[t];
  save();closeSheet();
  setTimeout(()=>{rSue();rHoy();},50);
}

// ── EXERCISE CUSTOMIZER ──────────────────────────────
let curChExId=null,curChDayId=null,curChGroup=0,curChPick=null;

function openChExSheet(exId,dayId){
  curChExId=exId;curChDayId=dayId;curChGroup=0;curChPick=null;
  const day=DAYS.find(d=>d.id===dayId);
  const ex=day.ex.find(e=>e.id===exId);
  const cur=S.customEx?.[exId]?.n||ex.n;
  document.getElementById('sh-chex-sub').textContent=`Slot ${ex.num} · D${dayId} ${day.n}`;
  renderChEx(cur);
  openSheet('sh-chex');
}

function renderChEx(curName){
  curName=curName||(()=>{
    const day=DAYS.find(d=>d.id===curChDayId);
    const ex=day?.ex.find(e=>e.id===curChExId);
    return S.customEx?.[curChExId]?.n||ex?.n||'';
  })();
  const tabs=EX_LIST.map((g,i)=>`<button class="grp-tab ${i===curChGroup?'on':''}" onclick="selChGroup(${i})">${g.g}</button>`).join('');
  const items=EX_LIST[curChGroup].ex.map((n,i)=>`<button class="ex-pick ${n===curChPick?'on':''}" onclick="pickChEx(${curChGroup},${i})">${n}</button>`).join('');
  document.getElementById('sh-chex-body').innerHTML=`
    <div class="cur-ex-tag">Actual: <b>${curName}</b></div>
    <div class="grp-tabs">${tabs}</div>
    <div class="ex-items">${items}</div>
    <button class="btnp" onclick="saveChEx()" style="margin-top:4px">Confirmar cambio</button>
    <button class="btns" onclick="resetChEx()">Restaurar ejercicio original</button>
    <div style="height:12px"></div>`;
}

function selChGroup(i){curChGroup=i;curChPick=null;renderChEx();}
function pickChEx(gi,ei){curChPick=EX_LIST[gi].ex[ei];renderChEx();}

function saveChEx(){
  if(!curChPick){closeSheet();return;}
  if(!S.customEx)S.customEx={};
  S.customEx[curChExId]={n:curChPick};
  save();closeSheet();
  setTimeout(rGym,50);
}

function resetChEx(){
  if(S.customEx)delete S.customEx[curChExId];
  save();closeSheet();
  setTimeout(rGym,50);
}

// ── BACKUP ───────────────────────────────────────────
function exportData(){
  const json=JSON.stringify(S,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`fittracker-backup-${tod()}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importData(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!parsed.workouts)throw new Error('Archivo inválido');
        S={...S,...parsed};
        save();
        nav(S.pg||'hoy');
        alert('Datos restaurados correctamente.');
      }catch(err){alert('Error al importar: '+err.message);}
    };
    r.readAsText(f);
  };
  inp.click();
}

// ── NAV ──────────────────────────────────────────────
function nav(pg){
  S.pg=pg;save();
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
  document.getElementById(`pg-${pg}`).classList.add('on');
  document.querySelector(`.nb[data-pg="${pg}"]`).classList.add('on');
  ({hoy:rHoy,gym:rGym,com:rCom,sta:rSta,sue:rSue})[pg]();
}

function goGym(id){S.day=id;nav('gym')}
function selDay(id){S.day=id;save();rGym()}
function chgWeek(d){S.week=Math.max(1,Math.min(7,S.week+d));save();rGym()}

// ── SHEET ────────────────────────────────────────────
let curSheet=null,curExId=null,curDayId=null,curMealId=null;

function openSheet(id){
  curSheet=id;
  document.getElementById('ov').classList.add('open');
  document.getElementById(id).classList.add('open');
  document.getElementById(id).scrollTop=0;
}

function closeSheet(){
  if(!curSheet)return;
  document.getElementById('ov').classList.remove('open');
  document.getElementById(curSheet).classList.remove('open');
  curSheet=null;
}

// ── EXERCISE SHEET ───────────────────────────────────
function openExSheet(exId,dayId){
  curExId=exId;curDayId=dayId;
  const day=DAYS.find(d=>d.id===dayId);
  const ex=day.ex.find(e=>e.id===exId);
  const ls=lastSess(exId,dayId);
  const saved=(S.workouts[curKey()]?.exercises?.[exId])||[];

  const sets=saved.length>=ex.s
    ?saved.slice(0,ex.s)
    :[...saved,...Array.from({length:ex.s-saved.length},(_,i)=>({
        w:ls?.sets[saved.length+i]?.w||'',
        r:ls?.sets[saved.length+i]?.r||'',
        done:false
      }))];

  document.getElementById('sh-ex-name').textContent=S.customEx?.[exId]?.n||ex.n;
  document.getElementById('sh-ex-plan').textContent=`${ex.s} series × ${rs(ex)} reps · desc ${ex.rest}`;
  document.getElementById('sh-ex-last').innerHTML=ls
    ?`Sem ${ls.week} (anterior): <b>${ls.sets.map(s=>`${s.w||'?'}kg×${s.r||'?'}`).join(' · ')}</b>`
    :'<span style="color:var(--muted)">Primera vez — establecé tu peso base</span>';

  document.getElementById('sh-ex-body').innerHTML=`
    <div class="sh"><div></div>
      <div class="scl">Peso (kg)</div>
      <div class="scl">Reps</div>
      <div class="scl">✓</div>
    </div>
    ${sets.map((s,i)=>`<div class="sr">
      <div class="sn">S${i+1}</div>
      <input class="si" type="number" id="w${i}" min="0" max="500" step="0.5" value="${s.w||''}" placeholder="${ls?.sets[i]?.w||'?'}">
      <input class="si" type="number" id="r${i}" min="0" max="100" value="${s.r||''}" placeholder="${rs(ex)}">
      <button class="sc2 ${s.done?'on':''}" id="c${i}" onclick="togSet(${i})">${s.done?'✓':''}</button>
    </div>`).join('')}
    <button class="btnp" onclick="saveEx(${ex.s})" style="margin-top:6px">Guardar ejercicio</button>
    <div style="height:16px"></div>`;

  openSheet('sh-ex');
}

function togSet(i){
  const el=document.getElementById(`c${i}`);
  const on=el.classList.toggle('on');
  el.textContent=on?'✓':'';
}

function saveEx(ns){
  const k=curKey();
  if(!S.workouts[k])S.workouts[k]={dayId:curDayId,week:S.week,date:tod(),exercises:{}};
  const sets=[];
  for(let i=0;i<ns;i++){
    sets.push({
      w:parseFloat(document.getElementById(`w${i}`)?.value)||0,
      r:parseInt(document.getElementById(`r${i}`)?.value)||0,
      done:document.getElementById(`c${i}`)?.classList.contains('on')||false,
    });
  }
  S.workouts[k].exercises[curExId]=sets;
  save();closeSheet();
  setTimeout(()=>{rGym();if(S.pg==='hoy')rHoy()},50);
}

// ── MEAL SHEET ───────────────────────────────────────
function openMealSheet(mealId){
  curMealId=mealId;
  const m=MEALS.find(x=>x.id===mealId);
  const t=tod();
  const ex=(S.nutrition[t]?.meals?.[mealId])||{};
  document.getElementById('sh-meal-name').textContent=m.n;
  document.getElementById('sh-meal-sub').textContent=m.t+(m.d?' · '+m.d:'');
  document.getElementById('in-p').value=ex.P||'';
  document.getElementById('in-c').value=ex.C||'';
  document.getElementById('in-f').value=ex.F||'';
  document.getElementById('in-notes').value=ex.notes||'';
  updK();
  openSheet('sh-meal');
}

function updK(){
  const k=kc(document.getElementById('in-p')?.value||0,document.getElementById('in-c')?.value||0,document.getElementById('in-f')?.value||0);
  const el=document.getElementById('kbox');
  if(el)el.innerHTML=`${k} kcal<small>P×4 + C×4 + G×9</small>`;
}

function saveMeal(){
  const t=tod();
  if(!S.nutrition[t])S.nutrition[t]={meals:{}};
  S.nutrition[t].meals[curMealId]={
    P:parseFloat(document.getElementById('in-p').value)||0,
    C:parseFloat(document.getElementById('in-c').value)||0,
    F:parseFloat(document.getElementById('in-f').value)||0,
    notes:document.getElementById('in-notes').value,
  };
  save();closeSheet();
  setTimeout(()=>{rCom();rHoy()},50);
}

function delMeal(){
  const t=tod();
  if(S.nutrition[t]?.meals?.[curMealId])delete S.nutrition[t].meals[curMealId];
  save();closeSheet();
  setTimeout(()=>{rCom();rHoy()},50);
}

// ── BW SHEET ─────────────────────────────────────────
function openBwSheet(){
  const bw=latBw();
  document.getElementById('in-bw').value=bw?.w||'';
  openSheet('sh-bw');
}

function saveBw(){
  const w=parseFloat(document.getElementById('in-bw').value);
  if(!w||w<30||w>250)return;
  const t=tod();
  S.bw=S.bw.filter(e=>e.d!==t);
  S.bw.push({d:t,w});
  S.bw.sort((a,b)=>a.d.localeCompare(b.d));
  save();closeSheet();
  setTimeout(()=>{rHoy();rSta()},50);
}

// ── INIT ─────────────────────────────────────────────
document.querySelectorAll('.nb').forEach(b=>b.addEventListener('click',()=>nav(b.dataset.pg)));
['in-p','in-c','in-f'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',updK)});

try{load();({hoy:rHoy,gym:rGym,com:rCom,sta:rSta,sue:rSue})[S.pg||'hoy']();}
catch(e){
  document.getElementById('pg-hoy').style.cssText='display:block;padding:20px';
  document.getElementById('pg-hoy').innerHTML=`<div style="font-family:monospace;color:var(--acc);font-size:13px;background:var(--panel);padding:16px;border:1px solid var(--line)"><b style="color:var(--warn)">Error:</b><br>${e.message}<br><br><small>${e.stack}</small></div>`;
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
